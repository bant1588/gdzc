<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>固定资产折旧管理系统（完整版）</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{padding:20px;max-width:1400px;margin:0 auto}
.card{margin-bottom:20px}
.hide{display:none}
.filter-group{display:flex;flex-wrap:wrap;gap:15px;align-items:center;margin-bottom:20px;padding:15px;background:#f8f9fa;border-radius:8px}
.print-only{display:none}
@media print {
  .no-print{display:none}
  .print-only{display:block}
  body{padding:0}
  .card{margin:0;border:none}
  .table{border-collapse:collapse}
  .table th, .table td{border:1px solid #333;padding:8px}
}
</style>
</head>
<body>
<h3 class="mb-4">固定资产折旧管理系统</h3>

<!-- 顶部操作按钮（新增筛选、打印） -->
<div class="d-flex flex-wrap gap-2 mb-3 no-print">
<button class="btn btn-primary" onclick="showAdd()">添加资产</button>
<button class="btn btn-success" onclick="exportData()">导出JSON备份</button>
<button class="btn btn-warning" onclick="exportExcel()">导出Excel明细表</button>
<label class="btn btn-info">
导入JSON数据
<input type="file" id="fileInput" accept=".json" hidden onchange="importData(event)">
</label>
<button class="btn btn-outline-danger" onclick="clearAll()">清空数据</button>
<button class="btn btn-secondary" onclick="window.print()">打印清单/明细</button>
<button class="btn btn-dark" onclick="showAssetList()">固定资产清单</button>
</div>

<!-- 多条件筛选区域（新增） -->
<div class="filter-group no-print" id="filterPanel">
<h5 class="mb-0 me-3">多条件筛选</h5>
<div class="d-flex flex-wrap gap-2">
<input type="text" id="filterName" class="form-control" placeholder="资产名称" style="width:150px">
<input type="text" id="filterType" class="form-control" placeholder="资产类别" style="width:150px">
<select class="form-select" id="filterStatus" style="width:150px">
<option value="all">所有状态</option>
<option value="using">在用</option>
<option value="scrapped">已报废</option>
<option value="disposed">已处置</option>
</select>
<select class="form-select" id="filterMethod" style="width:150px">
<option value="all">所有折旧方法</option>
<option value="average">平均年限法</option>
<option value="double">双倍余额递减法</option>
</select>
<button class="btn btn-primary" onclick="filterAssets()">筛选</button>
<button class="btn btn-outline-secondary" onclick="resetFilter()">重置</button>
</div>
</div>

<!-- 分类汇总区域（新增） -->
<div class="card no-print" id="summaryCard">
<div class="card-header">资产分类汇总</div>
<div class="card-body" id="summaryContent">
<!-- 汇总内容由JS渲染 -->
</div>
</div>

<!-- 添加/编辑面板 -->
<div class="card no-print" id="addPanel" style="display:none">
<div class="card-header">
<span id="panelTitle">新增固定资产</span>
</div>
<div class="card-body">
<div class="row g-3">
<div class="col-md-2">
<input class="form-control" id="name" placeholder="资产名称">
</div>
<div class="col-md-2">
<input class="form-control" id="code" placeholder="资产编号">
</div>
<div class="col-md-2">
<input class="form-control" id="type" placeholder="类别">
</div>
<div class="col-md-2">
<input type="date" class="form-control" id="buyDate">
</div>
<div class="col-md-2">
<input class="form-control" id="original" placeholder="原值" type="number">
</div>
<div class="col-md-2">
<input class="form-control" id="useYears" placeholder="使用年限" type="number">
</div>
<div class="col-md-2">
<input class="form-control" id="residualRate" placeholder="残值率%" type="number" value="5">
</div>
<div class="col-md-2">
<select class="form-select" id="method">
<option value="average">平均年限法</option>
<option value="double">双倍余额递减法</option>
</select>
</div>
<div class="col-md-2">
<select class="form-select" id="status">
<option value="using">在用</option>
<option value="scrapped">已报废</option>
<option value="disposed">已处置</option>
</select>
</div>
<div class="col-md-4">
<input class="form-control" id="remark" placeholder="备注">
</div>
<input type="hidden" id="editId">
</div>
<button class="btn btn-primary mt-3" onclick="saveAsset()">保存</button>
</div>
</div>

<!-- 资产处置面板（新增） -->
<div class="card no-print" id="disposePanel" style="display:none">
<div class="card-header">固定资产处置</div>
<div class="card-body">
<input type="hidden" id="disposeId">
<div class="row g-3">
<div class="col-md-4">
<label class="form-label">资产名称</label>
<input class="form-control" id="disposeName" readonly>
</div>
<div class="col-md-4">
<label class="form-label">处置日期</label>
<input type="date" class="form-control" id="disposeDate" required>
</div>
<div class="col-md-4">
<label class="form-label">处置方式</label>
<select class="form-select" id="disposeType" required>
<option value="">请选择处置方式</option>
<option value="sale">出售</option>
<option value="discard">报废处置</option>
<option value="donate">捐赠</option>
<option value="other">其他</option>
</select>
</div>
<div class="col-md-4">
<label class="form-label">处置金额（元）</label>
<input type="number" class="form-control" id="disposeAmount" placeholder="无则填0">
</div>
<div class="col-md-8">
<label class="form-label">处置说明</label>
<textarea class="form-control" id="disposeDesc" rows="2" placeholder="请填写处置相关说明"></textarea>
</div>
</div>
<button class="btn btn-primary mt-3 me-2" onclick="saveDispose()">确认处置</button>
<button class="btn btn-outline-secondary mt-3" onclick="hideDisposePanel()">取消</button>
</div>
</div>

<!-- 资产列表（主列表，含处置、报废按钮） -->
<div class="card" id="assetTableCard">
<div class="card-header">资产列表 & 折旧计算</div>
<div class="card-body p-0">
<div class="table-responsive">
<table class="table table-hover mb-0" id="assetTable">
<thead>
<tr>
<th>名称</th>
<th>编号</th>
<th>类别</th>
<th>购入日期</th>
<th>原值</th>
<th>年限</th>
<th>折旧方法</th>
<th>月折旧</th>
<th>净值</th>
<th>状态</th>
<th>操作</th>
</tr>
</thead>
<tbody id="listBody"></tbody>
</table>
</div>
</div>
</div>

<!-- 固定资产清单（新增，单独页面式展示） -->
<div class="card hide" id="assetListCard">
<div class="card-header d-flex justify-content-between align-items-center">
<h5>固定资产清单（按类别分组）</h5>
<button class="btn btn-sm btn-secondary no-print" onclick="hideAssetList()">关闭清单</button>
</div>
<div class="card-body" id="assetListContent">
<!-- 清单内容由JS渲染，按类别分组 -->
</div>
</div>

<!-- 折旧明细 -->
<div class="card mt-4" id="detailCard" class="hide">
<div class="card-header d-flex justify-content-between align-items-center">
<h5 id="detailTitle">折旧明细</h5>
<button class="btn btn-sm btn-secondary no-print" onclick="hideDetail()">关闭明细</button>
</div>
<div class="card-body">
<div id="detailContent"></div>
</div>
</div>

<!-- 处置记录明细（新增） -->
<div class="card mt-4 no-print" id="disposeDetailCard" style="display:none">
<div class="card-header d-flex justify-content-between align-items-center">
<h5>处置记录明细</h5>
<button class="btn btn-sm btn-secondary" onclick="hideDisposeDetail()">关闭</button>
</div>
<div class="card-body" id="disposeDetailContent">
<!-- 处置记录由JS渲染 -->
</div>
</div>

<script src="js/xlsx.full.min.js"></script>
<script src="js/app.js"></script>
<script src="js/calc.js"></script>
<script src="js/ui.js"></script>
<script src="js/file.js"></script>
</body>
</html>
